version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: wealthwise-mongodb-prod
    volumes:
      - mongodb_data_prod:/data/db
    environment:
      MONGO_INITDB_DATABASE: wealthwise
    networks:
      - wealthwise-network
    restart: always

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: wealthwise-api-prod
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/wealthwise
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - API_PORT=4000
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - mongodb
    networks:
      - wealthwise-network
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: wealthwise-web-prod
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - API_URL=http://api:4000
    depends_on:
      - api
    networks:
      - wealthwise-network
    restart: always

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
      target: production
    container_name: wealthwise-mcp-prod
    expose:
      - "5100"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/wealthwise
      - JWT_SECRET=${JWT_SECRET}
      - MCP_TRANSPORT=sse
      - MCP_PORT=5100
    depends_on:
      - mongodb
    networks:
      - wealthwise-network
    restart: always

  agentic-ai:
    build:
      context: .
      dockerfile: agentic-ai/Dockerfile
      target: production
    container_name: wealthwise-agentic-ai-prod
    expose:
      - "5200"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://mcp:5100
      - JWT_SECRET=${JWT_SECRET}
      - AGENT_PORT=5200
    depends_on:
      - mcp
    networks:
      - wealthwise-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: wealthwise-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
      - mcp
      - agentic-ai
    networks:
      - wealthwise-network
    restart: always

volumes:
  mongodb_data_prod:

networks:
  wealthwise-network:
    driver: bridge
