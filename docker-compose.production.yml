version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: wealthwise-mongodb-prod
    volumes:
      - mongodb_data_prod:/data/db
    environment:
      MONGO_INITDB_DATABASE: wealthwise
    networks:
      - wealthwise-network
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: wealthwise-api-prod
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/wealthwise
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - API_PORT=4000
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      mongodb:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    networks:
      - wealthwise-network
    restart: always
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: wealthwise-web-prod
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - API_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    networks:
      - wealthwise-network
    restart: always
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile.prod
    container_name: wealthwise-mcp-prod
    expose:
      - "5100"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/wealthwise
      - JWT_SECRET=${JWT_SECRET}
      - MCP_TRANSPORT=sse
      - MCP_PORT=5100
    depends_on:
      mongodb:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    networks:
      - wealthwise-network
    restart: always
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  agentic-ai:
    build:
      context: .
      dockerfile: agentic-ai/Dockerfile.prod
    container_name: wealthwise-agentic-ai-prod
    expose:
      - "5200"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://mcp:5100
      - JWT_SECRET=${JWT_SECRET}
      - AGENT_PORT=5200
    depends_on:
      mcp:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    networks:
      - wealthwise-network
    restart: always
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  nginx:
    image: nginx:alpine
    container_name: wealthwise-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      mcp:
        condition: service_healthy
      agentic-ai:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    networks:
      - wealthwise-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  # ── Coralogix: Log Shipper ──────────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: wealthwise-fluent-bit
    volumes:
      - ./coralogix/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./coralogix/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./coralogix/subsystem.lua:/fluent-bit/etc/subsystem.lua:ro
    environment:
      - CX_API_KEY=${CX_API_KEY}
      - CX_DOMAIN=${CX_DOMAIN:-coralogix.us}
    networks:
      - wealthwise-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2020/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Coralogix: OpenTelemetry Collector (Metrics + Traces) ───────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: wealthwise-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./coralogix/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CX_API_KEY=${CX_API_KEY}
      - CX_DOMAIN=${CX_DOMAIN:-coralogix.us}
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - wealthwise-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  mongodb_data_prod:

networks:
  wealthwise-network:
    driver: bridge
