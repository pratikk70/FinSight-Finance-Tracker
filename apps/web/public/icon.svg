<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- Upward trend line (finance/growth) -->
  <polyline
    points="5,22 11,15 16,18 22,10 27,13"
    stroke="white"
